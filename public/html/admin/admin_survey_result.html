<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Result Admin</title>

    <link rel="stylesheet" href="/css/admin_style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      .result-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 13px;
      }

      .result-table th {
        background: #f3f4f6;
        padding: 10px;
        border-bottom: 2px solid #e5e7eb;
        white-space: nowrap;
      }

      .result-table td {
        padding: 10px;
        border-bottom: 1px solid #e5e7eb;
      }

      .text-group {
        margin-bottom: 20px;
      }

      .answer-item {
        display: flex;
        gap: 10px;
        padding: 10px;
        background: #f9fafb;
        border-radius: 8px;
        margin-bottom: 6px;
      }

      .answer-number {
        width: 24px;
        height: 24px;
        background: #2563eb;
        color: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }

      /* 차트 영역 */
      .chart-box {
        height: 400px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
          "
        >
          <h2 style="margin: 0">Survey Result</h2>
        </div>
      </div>

      <div class="card chart-box">
        <canvas id="chart"></canvas>
      </div>

      <div class="card">
        <h3>Score Summary</h3>
        <div id="scoreTable"></div>
      </div>

      <div class="card">
        <h3>Open Answers</h3>
        <div id="textBox"></div>
      </div>
    </div>

    <script src="/js/common/authGuard.js"></script>
    <script type="module" src="/js/admin/admin_survey_result.js"></script>
  </body>
</html>
