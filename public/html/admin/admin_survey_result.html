<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Result Admin</title>

    <link rel="stylesheet" href="/css/admin_style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      .result-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 13px;
      }

      .result-table th {
        background: #f3f4f6;
        padding: 10px;
        border-bottom: 2px solid #e5e7eb;
        white-space: nowrap;
      }

      .result-table td {
        padding: 10px;
        border-bottom: 1px solid #e5e7eb;
      }

      .chart-box {
        height: 400px;
      }

      .top-bar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 10px;
      }

      select {
        padding: 8px;
        min-width: 260px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: white;
      }

      /* MODAL */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .modal-content {
        width: 90%;
        height: 90%;
        background: white;
        border-radius: 12px;
        overflow: hidden;
      }

      .modal-header {
        padding: 10px;
        background: #f3f4f6;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .close-btn {
        cursor: pointer;
        font-weight: bold;
      }

      iframe {
        width: 100%;
        height: calc(100% - 45px);
        border: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h2>Survey Result</h2>

        <!-- 응답자 선택 -->
        <div class="top-bar">
          <select id="respondentSelect">
            <option value="">Select Respondent</option>
          </select>
        </div>
      </div>

      <!-- CHART -->
      <div id="chartCard" class="card chart-box">
        <canvas id="chart"></canvas>
      </div>

      <!-- QUESTION LIST -->
      <div class="card">
        <h3>Question List</h3>
        <div id="questionBox"></div>
      </div>

      <!-- SCORE TABLE -->
      <div class="card">
        <h3>Score Summary</h3>
        <div id="scoreTable"></div>
      </div>

      <!-- TEXT ANSWERS -->
      <div class="card">
        <h3>Open Answers</h3>
        <div id="textBox"></div>
      </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <div>Response Detail</div>
          <div class="close-btn" onclick="closeModal()">X</div>
        </div>

        <iframe id="modalFrame"></iframe>
      </div>
    </div>

    <!-- JS -->
    <script src="/js/admin/admin_survey_result_view.js"></script>
  </body>
</html>
