<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/admin_style.css" />

    <style>
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      @media (max-width: 768px) {
        .top-bar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <div class="top-bar">
          <h1 class="page-title">Student Management</h1>

          <a
            href="/html/index.html"
            style="
              padding: 10px 14px;
              background: #111827;
              color: white;
              border-radius: 10px;
              text-decoration: none;
              font-size: 13px;
              white-space: nowrap;
            "
          >
            Home
          </a>
        </div>

        <div class="form-grid">
          <select id="class_id"></select>

          <input type="text" id="student_nm" placeholder="Student Name" />

          <button id="saveBtn" class="btn-primary" onclick="saveStudent()">
            Add Student
          </button>

          <button class="btn-gray" onclick="resetForm()">Reset</button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="card">
        <!-- DESKTOP TABLE -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Class</th>
                <th>Student</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="studentBody"></tbody>
          </table>
        </div>

        <!-- MOBILE -->
        <div id="mobileStudentBody" class="mobile-card"></div>
      </div>
    </div>

    <!-- <script src="/js/common/common.js"></script> -->
    <script src="/js/common/authGuard.js"></script>
    <script type="module" src="/js/admin/admin_student.js"></script>
  </body>
</html>
