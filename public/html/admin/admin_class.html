<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Management</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/admin_style.css" />

    <style>
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      @media (max-width: 768px) {
        .top-bar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Page Header -->
      <div class="card">
        <div class="top-bar">
          <h1 class="page-title">Class Management</h1>

          <a
            href="/html/index.html"
            style="
              padding: 10px 14px;
              background: #111827;
              color: white;
              border-radius: 10px;
              text-decoration: none;
              font-size: 13px;
              white-space: nowrap;
            "
          >
            Home
          </a>
        </div>

        <div class="form-grid">
          <select id="org_id"></select>

          <input type="text" id="class_nm" placeholder="Class Name" />

          <button id="saveBtn" class="btn-primary" onclick="saveClass()">
            Add Class
          </button>

          <button class="btn-gray" onclick="resetForm()">Reset</button>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <!-- Desktop -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Organization</th>
                <th>Class Name</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="classBody"></tbody>
          </table>
        </div>

        <!-- Mobile -->
        <div id="mobileClassBody" class="mobile-card"></div>
      </div>
    </div>
    <script src="/js/common/authGuard.js"></script>
    <script type="module" src="/js/admin/admin_class.js"></script>
  </body>
</html>
