<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Survey Title Management</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/admin_style.css" />

    <style>
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .switch-box {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #f9fafb;
      }

      .switch-box input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
      }

      .status-on {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #dcfce7;
        color: #166534;
        font-size: 12px;
        font-weight: 700;
      }

      .status-off {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #fee2e2;
        color: #991b1b;
        font-size: 12px;
        font-weight: 700;
      }

      @media (max-width: 768px) {
        .top-bar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- FORM -->
      <div class="card">
        <div class="top-bar">
          <h1 class="page-title">Survey Title Management</h1>

          <a
            href="/html/index.html"
            style="
              padding: 10px 14px;
              background: #111827;
              color: white;
              border-radius: 10px;
              text-decoration: none;
              font-size: 13px;
              white-space: nowrap;
            "
          >
            Home | الرئيسية
          </a>
        </div>

        <div class="form-grid">
          <input id="survey_title" type="text" placeholder="Survey Title" />

          <div class="switch-box">
            <input type="checkbox" id="use_yn" checked />

            <label for="use_yn">Use Survey</label>
          </div>

          <button id="saveBtn" class="btn-primary" onclick="saveSurvey()">
            Add Survey
          </button>

          <button class="btn-gray" onclick="resetForm()">Reset</button>
        </div>
      </div>

      <!-- LIST -->
      <div class="card">
        <!-- DESKTOP -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>

                <th>Survey Title</th>

                <th>Status</th>

                <th>Action</th>
              </tr>
            </thead>

            <tbody id="surveyBody"></tbody>
          </table>
        </div>

        <!-- MOBILE -->
        <div id="mobileSurveyBody" class="mobile-card"></div>
      </div>
    </div>

    <!-- <script src="/js/common/common.js"></script> -->
    <script src="/js/common/authGuard.js"></script>
    <script type="module" src="/js/admin/admin_survey_title.js"></script>
  </body>
</html>
