<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organization Management</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/admin_style.css" />

    <style>
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      @media (max-width: 768px) {
        .top-bar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <div class="top-bar">
          <h1 class="page-title">Organization Management | إدارة المؤسسات</h1>

          <a href="/" class="btn-home"> Home | الرئيسية </a>
        </div>

        <div class="form-grid">
          <input id="org_nm" type="text" placeholder="Organization Name" />
          <input id="org_place" type="text" placeholder="Location" />

          <button id="saveBtn" class="btn-primary" onclick="saveOrg()">
            Add Organization | إضافة مؤسسة
          </button>

          <button class="btn-gray" onclick="resetForm()">
            Reset | إعادة ضبط
          </button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Organization</th>
                <th>Location</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="orgBody"></tbody>
          </table>
        </div>

        <div id="mobileOrgBody" class="mobile-card"></div>
      </div>
    </div>

    <!-- COMMON (먼저 로드) -->
    <script src="/js/common/common.js"></script>

    <!-- MODULE (CRUD) -->
    <script type="module" src="/js/admin/admin_org.js"></script>
  </body>
</html>
