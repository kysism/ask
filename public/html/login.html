<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>KOICA Survey System</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #06263f, #0f4c75);
        font-family: Arial;
      }

      /* CARD */
      .card {
        width: 440px;
        background: #fff;
        border-radius: 18px;
        padding: 36px;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
      }

      /* HEADER */
      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header img {
        width: 110px;
        margin-bottom: 10px;
      }

      .header h1 {
        font-size: 20px;
        color: #0f4c75;
        margin: 0;
      }

      .subtitle {
        font-size: 13px;
        color: #777;
        margin-top: 6px;
      }

      /* BUTTON */
      button {
        width: 100%;
        height: 52px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      /* PRIMARY */
      .btn-primary {
        background: linear-gradient(135deg, #1976d2, #0d47a1);
        color: white;
      }

      /* DANGER */
      .btn-danger {
        background: linear-gradient(135deg, #c62828, #8e0000);
        color: white;
        margin-top: 12px;
      }

      /* INPUT */
      input {
        width: 100%;
        height: 52px;
        border-radius: 10px;
        border: 1px solid #ddd;
        padding: 0 14px;
        font-size: 16px;
        box-sizing: border-box;
      }

      /* LOGIN AREA */
      .login-area {
        display: none;
        margin-top: 15px;
      }

      /* STATUS */
      .status {
        margin-top: 18px;
        font-size: 13px;
        text-align: center;
        color: #666;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <!-- HEADER -->
      <div class="header">
        <img src="./img/koica.png" />
        <h1>KOICA Survey System</h1>
        <div class="subtitle">
          Secure Access Gateway for Authorized Administrators
        </div>
      </div>

      <!-- STEP 1 -->
      <button class="btn-primary" onclick="generatePassword()">
        GENERATE ACCESS TOKEN
      </button>

      <!-- STEP 2 -->
      <div class="login-area" id="loginArea">
        <input
          type="password"
          id="password"
          placeholder="Enter verification password"
        />

        <button class="btn-danger" onclick="login()">VERIFY & LOGIN</button>
      </div>

      <div class="status" id="message">
        Waiting for secure token generation...
      </div>
    </div>

    <script>
      const API = "https://fcm-61ns.onrender.com/api";

      async function generatePassword() {
        const res = await fetch(`${API}/auth/generate`, { method: "POST" });
        const json = await res.json();

        if (!json.success) {
          document.getElementById("message").innerText =
            "Token generation failed.";
          return;
        }

        sessionStorage.removeItem("koica_survey_admin_pwd");

        document.getElementById("loginArea").style.display = "block";

        document.getElementById("message").innerText =
          "Access token sent to registered admin devices.";
      }

      async function login() {
        const password = document.getElementById("password").value;

        if (!password) {
          alert("Please enter password");
          return;
        }

        const res = await fetch(`${API}/auth/verify`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });

        const json = await res.json();

        if (!json.success) {
          document.getElementById("message").innerText =
            "Invalid verification code.";
          return;
        }

        sessionStorage.setItem("koica_survey_admin_pwd", password);
        location.href = "/index.html";
      }
    </script>
  </body>
</html>
