<!doctype html>
<html>
  <head>

    <title>Survey Response</title>

    <link rel="stylesheet" href="/css/admin_style.css" />

    <style>
      body {
        background: #f3f4f6;
      }

      .container {
        max-width: 900px;
        margin: auto;
      }

      .question-card {
        background: white;
        border-radius: 20px;
        padding: 22px;
        margin-bottom: 18px;
      }

      .submit-btn {
        width: 100%;
        height: 56px;

        background: #2563eb;

        font-size: 18px;
        font-weight: bold;
      }

      .block-box,
      .thank-you {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="survey-header">
        <h1 id="surveyTitle">Survey</h1>
      </div>

      <div id="surveyBox"></div>
