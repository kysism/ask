<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Survey Response</title>
    <link rel="stylesheet" href="/css/admin_style.css" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #f3f4f6;
      }

      .survey-header {
        text-align: center;
        margin-bottom: 24px;
      }

      .survey-header h1 {
        font-size: 30px;
        color: #111827;
        margin-bottom: 8px;
      }

      .survey-header p {
        color: #6b7280;
        font-size: 14px;
      }

      .question-card {
        background: white;
        border-radius: 20px;
        padding: 22px;
        margin-bottom: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border-left: 5px solid #2563eb;
      }

      .question-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 18px;
        line-height: 1.6;
        color: #111827;
      }

      .required {
        color: #dc2626;
        margin-left: 6px;
      }

      .scale-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
      }

      .scale-option {
        position: relative;
      }

      .scale-option input {
        display: none;
      }

      .scale-option label {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        min-height: 80px;

        border: 2px solid #e5e7eb;
        border-radius: 14px;

        cursor: pointer;

        font-size: 13px;
        font-weight: 600;

        transition: 0.2s;

        background: #f9fafb;
        text-align: center;
        padding: 10px;
      }

      .scale-option input:checked + label {
        background: #2563eb;
        color: white;
        border-color: #2563eb;
        transform: translateY(-2px);
      }

      .scale-score {
        font-size: 22px;
        margin-bottom: 6px;
      }

      textarea {
        width: 100%;
        max-width: 100%;

        min-height: 140px;

        border: 2px solid #e5e7eb;
        border-radius: 16px;

        padding: 16px;

        resize: vertical;

        font-size: 15px;
        outline: none;

        transition: 0.2s;

        box-sizing: border-box;
        display: block;
      }

      textarea:focus {
        border-color: #2563eb;
      }

      .submit-area {
        margin-top: 30px;
      }

      .submit-btn {
        width: 100%;
        height: 58px;

        border: none;
        border-radius: 16px;

        background: linear-gradient(135deg, #2563eb, #1d4ed8);

        color: white;
        font-size: 18px;
        font-weight: bold;

        cursor: pointer;

        transition: 0.2s;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
      }

      .thank-you {
        background: white;
        padding: 40px 24px;
        border-radius: 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      .thank-you h2 {
        color: #111827;
        margin-bottom: 12px;
        font-size: 28px;
      }

      .thank-you p {
        color: #6b7280;
        line-height: 1.8;
      }

      .block-box {
        background: white;
        padding: 40px 24px;
        border-radius: 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      .block-box h2 {
        color: #dc2626;
        margin-bottom: 10px;
      }

      @media (max-width: 768px) {
        .scale-grid {
          grid-template-columns: 1fr;
        }

        .question-title {
          font-size: 16px;
        }

        .survey-header h1 {
          font-size: 24px;
        }

        .scale-option label {
          min-height: 64px;
          flex-direction: row;
          justify-content: flex-start;
          gap: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- SURVEY HEADER -->
      <div class="survey-header">
        <h1 id="surveyTitle">Survey</h1>

        <p>
          Please answer the survey carefully | من فضلك أجب على الاستبيان بعناية
        </p>
      </div>

      <!-- SURVEY BOX -->
      <div id="surveyBox"></div>
    </div>
    <script type="module" src="/js/client/survey_view.js"></script>
  </body>
</html>
